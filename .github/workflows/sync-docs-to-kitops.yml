name: Sync docs to KitOps repository

on:
  workflow_call:
    secrets:
      KITOPS_BOT_PRIVATE_KEY:
        required: true
  workflow_dispatch:

concurrency:
  group: sync-docs-to-kitops
  cancel-in-progress: true

env:
  KITOPS_PATH: "kitops-clone"
  KITOPS_TS_DOCS_PATH: "docs/kitops-ts"

jobs:
  sync-docs-to-kitops:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ vars.KITOPS_BOT_ID }}
          private-key: ${{ secrets.KITOPS_BOT_PRIVATE_KEY }}
          owner: kitops-ml
          repositories: kitops

      - name: Checkout kitops-ts repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout KitOps repository to subdirectory
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.generate-token.outputs.token }}
          repository: kitops-ml/kitops
          ref: main
          path: ${{ env.KITOPS_PATH }}

      - name: Copy kitops-ts docs into KitOps docs dir
        run: |
          # Remove existing directory to ensure any old files are removed
          rm -rf "${KITOPS_PATH}/${KITOPS_TS_DOCS_PATH}"
          mkdir -p "${KITOPS_PATH}/${KITOPS_TS_DOCS_PATH}"
          cp -r docs/. "${KITOPS_PATH}/${KITOPS_TS_DOCS_PATH}"

      - name: Get short SHA
        id: get-sha
        run: |
          SHA=${{ github.sha }}
          echo "sha=${SHA:0:10}" >> $GITHUB_OUTPUT

      - name: Open PR in KitOps repo with docs changes
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45f # v7.0.8
        with:
          path: ${{ env.KITOPS_PATH }}
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: |
            Update kitops-ts documentation

            Update kitops-ts documentation to reflect commit ${{ github.sha }}
            in repository ${{ github.server_url }}/${{ github.repository }}
          title: Update kitops-ts documentation
          body: |
            Update the kitops-ts section of the documentation to reflect commit
            [`${{ steps.get-sha.outputs.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            in ${{ github.server_url }}/${{ github.repository }}
          branch: kitops-ts-docs-update
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}@users.noreply.github.com>
          signoff: true
          delete-branch: true
